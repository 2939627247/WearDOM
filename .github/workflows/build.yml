name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Assemble Debug APK (API 36)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ────────────────────────────────────────────────────
      # AGP 9.x default build-tools version is 36.0.0
      - name: Install Android SDK Platform 36
        run: |
          echo "y" | \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
              "platforms;android-36" \
              "build-tools;36.0.0" \
          2>&1 | grep -Ev "^Warning|^Parsing|^\[="

      # ── 4. Gradle 9.5.1 ──────────────────────────────────────────────────
      - name: Setup Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.5.1'

      # ── 5. Build ─────────────────────────────────────────────────────────
      - name: Assemble Debug APK
        run: gradle :app:assembleDebug
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.daemon=false
            -Dkotlin.incremental=false
            -Dandroid.useAndroidX=true

      # ── 6. Upload artifact ────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v5
        with:
          name: WearDOM-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30