name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Assemble Release APK — debug-signed (API 36)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ────────────────────────────────────────────────────
      # AGP 9.x default build-tools version for API 36
      - name: Install Android SDK Platform 36
        run: |
          echo "y" | \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
              "platforms;android-36" \
              "build-tools;36.0.0" \
          2>&1 | grep -Ev "^Warning|^Parsing|^\[="

      # ── 4. Gradle 9.5.1 ──────────────────────────────────────────────────
      - name: Setup Gradle 9.5.1
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.5.1'

      # ── 5. Build ─────────────────────────────────────────────────────────
      - name: Assemble Release APK (debug-signed)
        run: gradle :app:assembleRelease
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.daemon=false
            -Dkotlin.incremental=false
            -Dandroid.useAndroidX=true

      # ── 6. Upload artifact ────────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v6
        with:
          name: SmartThings-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      # ── 7. Publish to a GitHub Release ──────────────────────────────────
      # Workflow-run artifacts are stored on Azure Blob storage, which is
      # not reachable from every environment. Release assets are served
      # from release-assets.githubusercontent.com instead, so this makes
      # the APK downloadable everywhere the artifact above is not.
      # Only runs on pushes to main (not PRs) — moving 'latest-build' tag
      # is overwritten each time so there's always exactly one current APK.
      - name: Publish APK to 'latest-build' release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          gh release delete latest-build --yes --cleanup-tag || true
          gh release create latest-build "$APK_PATH" \
            --repo "${{ github.repository }}" \
            --title "Latest build ($(date -u +%Y-%m-%d) — ${{ github.sha }})" \
            --notes "Automated debug-signed release APK from commit ${{ github.sha }}." \
            --prerelease